<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusLearn // Founder Master Terminal</title>
    <style>
        body {
            background-color: #050811;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* PREMIUM APP GRID CONTAINER */
        .container {
            background-color: #0F1626;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 380px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.8);
            z-index: 10;
            border: 1px solid rgba(212, 175, 55, 0.35);
        }
        h1.admin-logo { 
            color: #D4AF37; 
            font-size: 38px; 
            margin: 0 0 5px 0; 
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
        }
        p.subtitle { color: #D4AF37; font-size: 11px; margin: 0 0 25px 0; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        
        .panel-box {
            background-color: #050811;
            border-radius: 10px;
            padding: 18px;
            font-size: 14px;
            color: #D1D5DB;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        label { display: block; text-align: left; font-size: 13px; margin-top: 15px; color: #E5E7EB; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            box-sizing: border-box;
            background-color: #050811;
            border: 1px solid #1F2937;
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #D4AF37; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 18px 0 5px 0;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7); 
            color: #050811; 
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }

        .pin-display {
            font-size: 28px;
            font-family: 'Courier New', Courier, monospace;
            color: #D4AF37;
            text-align: center;
            font-weight: bold;
            letter-spacing: 4px;
            margin: 15px 0;
            background: #050811;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #D4AF37;
        }

        .fixed-left-footer {
            position: fixed;
            bottom: 20px;
            left: 25px;
            font-size: 12.5px;
            color: #9CA3AF;
            font-style: italic;
        }
        .fixed-left-footer strong { color: #D4AF37; font-style: normal; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="admin-login-view" class="container">
        <h1 class="admin-logo">▲ CORE</h1>
        <p class="subtitle">Founder Security Check</p>
        
        <label>Master Root Username:</label>
        <input type="text" id="root-user" placeholder="Enter root identity">
        
        <label>Master Passkey Matrix:</label>
        <input type="password" id="root-pass" placeholder="Enter master security key">
        
        <button class="btn btn-primary" onclick="handleAdminAuth()">Unlock Central Systems</button>
    </div>

    <div id="admin-dashboard-view" class="container hidden">
        <h1 class="admin-logo">▲ SYSTEM CONTROLS</h1>
        <p class="subtitle">NexusLearn Management Deck</p>
        
        <div class="panel-box">
            <strong>Generate Teacher Authorization PIN</strong>
            <p style="font-size:11px; color:#9CA3AF; margin:4px 0 12px 0;">Creates a secure token keyset required for new educator profiles.</p>
            <div id="pin-output" class="pin-display">----</div>
            <button class="btn btn-primary" style="padding:10px; margin:0;" onclick="generateSecurePIN()">Generate Token Node</button>
        </div>

        <div class="panel-box">
            <strong>Update Payment/Subscription Vector</strong>
            <label>Target Teacher Username:</label>
            <input type="text" id="target-teacher" placeholder="e.g., school_admin">
            <button class="btn btn-primary" style="padding:10px; margin-top:12px;" onclick="flagPaymentStatus()">Authorize Payment Tier [PAID]</button>
        </div>
    </div>

    <div class="fixed-left-footer">
        producer/founder - <strong>Talabi David Adeoluwa</strong>
    </div>

    <script>
        // Secure access verification
        function handleAdminAuth() {
            const user = document.getElementById('root-user').value.strip;
            const pass = document.getElementById('root-pass').value;
            
            // Temporary hardcoded structural login until database link
            if (user === "david" && pass === "nexus2026") {
                document.getElementById('admin-login-view').classList.add('hidden');
                document.getElementById('admin-dashboard-view').classList.remove('hidden');
            } else {
                alert("ACCESS VIOLATION: Invalid structural credentials.");
            }
        }

        // Generate Random 4-Digit Tokens
        function generateSecurePIN() {
            const randomPIN = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('pin-output').innerText = randomPIN;
            alert("New Token Registered to Core Parameters: " + randomPIN);
        }

        function flagPaymentStatus() {
            const teacher = document.getElementById('target-teacher').value;
            if(teacher) {
                alert("Database Command Broadcasted:\n" + teacher + " flagged status updated to [PAID]");
            }
        }
    </script>
</body>
</html>
