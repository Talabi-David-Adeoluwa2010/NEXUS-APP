<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusLearn // Educator Gateway</title>
    <style>
        body {
            background-color: #050811;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: #0F1626;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.8);
            border: 1px solid rgba(212, 175, 55, 0.35);
            box-sizing: border-box;
        }

        .logo {
            color: #D4AF37;
            font-size: 28px;
            margin: 0 0 5px 0;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
            font-weight: bold;
        }

        .subtitle {
            color: #A0AABF;
            font-size: 11px;
            margin: 0 0 25px 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 13px;
            margin-top: 15px;
            color: #E5E7EB;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            box-sizing: border-box;
            background-color: #050811;
            border: 1px solid #1F2937;
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #D4AF37;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 25px 0 15px 0;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7);
            color: #050811;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .nav-link {
            color: #6C757D;
            font-size: 12px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        .nav-link:hover {
            color: #D4AF37;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #9CA3AF;
        }

        .footer strong {
            color: #D4AF37;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Educator Gateway</div>
        <div class="subtitle">Secure Terminal Authentication</div>
        
        <label>Username / Email:</label>
        <input type="text" id="teacher-user" placeholder="Enter educator profile identifier">
        
        <label>Password:</label>
        <input type="password" id="teacher-pass" placeholder="Enter access credentials">
        
        <button class="btn" onclick="verifyEducatorCredentials()">Verify Credentials</button>
        
        <a href="#" class="nav-link">← Return to Gateway</a>
        
        <div class="footer">
            producer/founder - <strong>Talabi David Adeoluwa</strong>
        </div>
    </div>

    <script>
        function verifyEducatorCredentials() {
            const user = document.getElementById('teacher-user').value.trim();
            const pass = document.getElementById('teacher-pass').value;

            if (!user || !pass) {
                alert("Please fill in all layout credentials fields.");
                return;
            }

            // Client-side execution loop to bypass backend network dependencies
            alert(`Authentication Request Processed Locally:\nUser: ${user}\nStatus: Portal Interface Active`);
        }
    </script>
</body>
</html>
