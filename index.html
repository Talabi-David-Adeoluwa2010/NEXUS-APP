<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusLearn // Synchronizing...</title>
    <style>
        /* Base Styles for Resizability */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling during load */
            background-color: #050811;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container designed to scale */
        .loading-container {
            text-align: center;
            width: 90%;
            max-width: 500px; /* Limits width on large screens */
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Logo Container using the Uploaded Image */
        .logo-container {
            width: 160px;
            height: 160px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 0px 20px rgba(126, 162, 198, 0.45));
        }

        h1.app-name {
            color: #D4AF37;
            font-size: 2.5rem; /* Scales with screen size */
            margin: 0 0 5px 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* Loading Bar Styles */
        .progress-box {
            width: 100%;
            margin: 30px 0;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #1F2937;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #BF953F, #FCF6BA, #D4AF37);
            width: 0%; /* Initial state */
            transition: width 0.05s linear; /* Smooth animation */
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .percentage {
            color: #D4AF37;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: bold;
        }

        /* About Section */
        .about-section {
            background-color: #0F1626;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            width: 100%;
            box-sizing: border-box;
            text-align: left;
        }

        .about-section h2 {
            color: #D4AF37;
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .about-section p {
            color: #9CA3AF;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }

        /* Fixed Founder Footer (Bottom Left) */
        .fixed-founder {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: #6C757D;
            z-index: 5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fixed-founder strong {
            color: #9CA3AF;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        
        <div class="logo-container">
            <img src="/static/IMG_5615.jpeg" alt="NexusLearn Logo" class="logo-image">
        </div>

        <h1 class="app-name">NexusLearn</h1>

        <div class="progress-box">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="percentage" id="percentageText">0%</div>
        </div>

        <div class="about-section">
            <h2>About the App</h2>
            <p>Connecting minds globally. NexusLearn is the premium transmission hub empowering teachers and students with real-time, global video communication for seamless learning experiences across borders.</p>
        </div>
    </div>

    <div class="fixed-founder">
        produced / founded by <strong>Talabi David Adeoluwa</strong>
    </div>

    <script>
        let progress = 0;
        const fill = document.getElementById('progressFill');
        const text = document.getElementById('percentageText');

        function updateLoading() {
            progress += 1;
            fill.style.width = progress + '%';
            text.innerText = progress + '%';

            if (progress < 100) {
                setTimeout(updateLoading, 30); 
            } else {
                text.innerText = "COMPLETE // SYNCHRONIZED";
            }
        }

        // Start loading
        updateLoading();
    </script>
</body>
</html>
