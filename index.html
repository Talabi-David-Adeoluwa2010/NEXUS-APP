<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusLearn // Enterprise Unified Web Client</title>
    <style>
        :root {
            --bg-dark: #050811;
            --panel-dark: rgba(15, 22, 38, 0.98);
            --gold-primary: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7);
            --text-light: #FFFFFF;
            --text-muted: #9CA3AF;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* MASTER INTEGRATED PLATFORM SUITE INTERFACE PANELS */
        .workspace-classroom-suite {
            display: flex;
            width: 98vw;
            height: 92vh;
            background-color: var(--panel-dark);
            border-radius: 14px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
        }

        .split-column-deck {
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            border-right: 1px solid rgba(212, 175, 55, 0.15);
            box-sizing: border-box;
        }

        #left-av-block { flex: 1.1; min-width: 380px; }
        #center-chat-block { flex: 1; min-width: 340px; }
        #right-extract-block { flex: 0.9; min-width: 320px; resize: horizontal; overflow: auto; background-color: rgba(5, 8, 17, 0.5); border-right: none; }

        .video-box-matrix {
            flex: 1;
            background-color: #000000;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            text-align: center;
            padding: 10px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.95);
            font-family: monospace;
        }

        /* LIVE CHAT ENGINE SCROLL CONTAINER BOX */
        .chat-display-window {
            flex: 1;
            background-color: #000000;
            border-radius: 10px;
            border: 1px solid #1F2937;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-msg-row { line-height: 1.4; word-break: break-all; }
        .chat-time { color: var(--text-muted); font-size: 11px; margin-right: 6px; }
        .chat-user { color: var(--gold-primary); font-weight: bold; margin-right: 6px; }

        .container {
            background-color: var(--panel-dark);
            padding: 45px;
            border-radius: 24px;
            text-align: center;
            width: 410px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            z-index: 1000;
        }

        label { display: block; text-align: left; font-size: 13px; margin-top: 14px; color: #D1D5DB; }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            box-sizing: border-box;
            background-color: #000000;
            border: 1px solid #374151;
            border-radius: 8px;
            color: var(--text-light);
            font-size: 14px;
        }
        input:focus, textarea:focus { border-color: var(--gold-primary); outline: none; }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary { background: var(--gold-gradient); color: #050811; }
        .btn-secondary { background-color: #0F1626; color: var(--gold-primary); border: 1px solid var(--gold-primary); }
        .btn-secondary:hover { background-color: rgba(212, 175, 55, 0.08); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-gateway" class="container">
        <h2 style="color:var(--gold-primary); margin:0 0 5px 0; font-size:32px; font-weight:800;">NexusLearn Suite</h2>
        <p style="color:var(--text-muted); font-size:11px; margin:0 0 35px 0; letter-spacing:1px; font-weight:bold; text-transform:uppercase;">Unified Platform Live Control Ecosystem</p>
        
        <button class="btn btn-primary" onclick="triggerPortalSetup('teacher')">[ Host Workspace as Instructor ]</button>
        <button class="btn btn-secondary" onclick="triggerPortalSetup('student')">[ Join Active Learning Node ]</button>

        <div id="dynamic-fields-area" class="hidden" style="margin-top:25px; border-top:1px solid rgba(212, 175, 55, 0.2); padding-top:20px;">
            <label id="input-profile-string-lbl"></label>
            <input type="text" id="main-user-handle" value="Web_User_Node">
            
            <label style="margin-top:12px;">Class Identification Pin Access Code Matrix:</label>
            <input type="text" id="main-room-pin" value="Z5K9P3">
            
            <button class="btn btn-primary" style="background: linear-gradient(135deg, #BF953F, #FBF5B7); color:#000; margin-top:25px;" onclick="deployLiveWorkspaceSuite()">Initialize Active Workspace Suite</button>
        </div>
    </div>

    <div id="live-classroom-view-suite" class="workspace-classroom-suite hidden">
        
        <div class="split-column-deck" id="left-av-block">
            <div style="font-size:12px; font-weight:800; color:var(--gold-primary); letter-spacing:0.8px;" id="header-data-bus-string">ROOM BUS LIVE // LOG MATRIX SYNCING</div>
            
            <div class="video-box-matrix" id="local-cam-video" style="border-left: 5px solid #5BC0BE;">
                🎥 CHASSIS FEED OUT: LOCAL HD WEBCAM TRANSMITTING [30FPS SYNCED]
            </div>
            
            <div class="video-box-matrix" id="remote-peer-video" style="border-left: 5px solid var(--gold-primary);">
                🔊 REMOTE INTERACTION MONITOR ENABLED // P2P NETWORK OVERLAY DOCK SECURED
            </div>

            <div style="background:rgba(0,0,0,0.7); padding:12px; border-radius:10px; display:flex; align-items:center; justify-content:space-between; border:1px solid rgba(212, 175, 55, 0.15);">
                <span id="audio-deck-lbl" style="font-size:12px; color:var(--text-muted); font-family:monospace;">Audio Vector: Track Standby</span>
                <button class="btn btn-secondary" style="width:auto; margin:0; padding:5px 12px; font-size:11px;" onclick="simImportAudioTrack()">Import Track</button>
            </div>

            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" style="margin:0; flex:1;" id="cam-toggle-trigger" onclick="toggleLocalHardware()">Toggle Camera</button>
                <button class="btn btn-secondary" style="margin:0; flex:1; border-color:#E63946; color:#E63946;" onclick="location.reload()">Disconnect</button>
            </div>
        </div>

        <div class="split-column-deck" id="center-chat-block">
            <div style="font-size:11px; font-weight:bold; color:var(--gold-primary); letter-spacing:0.5px;">💬 LIVE ROOM MESSAGING DECK</div>
            <div class="chat-display-window" id="chat-logs-viewport">
                </div>
            <div style="display:flex; gap:6px;">
                <input type="text" id="chat-input-field" placeholder="Type text packet transmission entry..." onkeydown="if(event.key === 'Enter') fireWebChatMessage()">
                <button class="btn btn-primary" style="width:auto; margin:0; padding:0 20px;" onclick="fireWebChatMessage()">Send</button>
            </div>
        </div>

        <div class="split-column-deck" id="right-extract-block">
            <label style="font-size:11px; font-weight:bold; color:var(--gold-primary); margin:0;">📎 RESIZABLE TOOL WORKPAD MATRIX PANEL</label>
            <input type="text" id="web-storage-tag" value="Session_Extract_Data">
            <textarea id="web-storage-body" style="flex:1; margin-top:8px; font-family:'Consolas', monospace; font-size:13px; line-height:1.5;" placeholder="Track technical logs, capture workspace files, or pull standard structural note properties here..."></textarea>
            
            <button class="btn btn-primary" style="margin-top:12px; font-size:12px; padding:12px;" onclick="executeDataVaultWrite()">💾 Save/Extract Data Archive</button>
            <button class="btn btn-secondary" style="margin-top:6px; font-size:12px; padding:10px;" onclick="executeDataVaultRead()">📂 Load Data Archive</button>
        </div>

    </div>

    <script>
        let operationalProfile = "";
        let cameraActiveFlag = true;

        function triggerPortalSetup(role) {
            operationalProfile = role;
            document.getElementById('dynamic-fields-area').classList.remove('hidden');
            document.getElementById('input-profile-string-lbl').innerText = role === 'teacher' ?
                "Set Instructor Configuration Name Tag:" : "Set Connected Student Node Identifier:";
        }

        function deployLiveWorkspaceSuite() {
            const handle = document.getElementById('main-user-handle').value.trim();
            const securityPin = document.getElementById('main-room-pin').value.trim();

            if(handle && securityPin) {
                document.getElementById('auth-gateway').classList.add('hidden');
                document.getElementById('live-classroom-view-suite').classList.remove('hidden');
                document.getElementById('header-data-bus-string').innerText = `🔴 NEXUS ROOM ACTIVE // INTERFACE PIN: ${securityPin.toUpperCase()} // USER HANDLE: ${handle}`;
                
                // Inject an initial system sync entry row to let the user see it work instantly
                appendChatMessageToViewport("System", "Handshake negotiation verified. Live session operational channel open.");
            }
        }

        function toggleLocalHardware() {
            cameraActiveFlag = !cameraActiveFlag;
            const container = document.getElementById('local-cam-video');
            const button = document.getElementById('cam-toggle-trigger');
            
            container.innerText = cameraActiveFlag ? "🎥 CHASSIS FEED OUT: LOCAL HD WEBCAM TRANSMITTING [30FPS SYNCED]" : "[ ❌ LOCAL WEBCAM DISCONNECTED (BLOCKED) ]";
            container.style.backgroundColor = cameraActiveFlag ? "#000000" : "#1A050A";
            button.innerText = cameraActiveFlag ? "Close Camera" : "Open Camera";
        }

        function simImportAudioTrack() {
            document.getElementById('audio-deck-lbl').innerText = "▶ Track: custom_imported_stream.mp3";
            document.getElementById('audio-deck-lbl').style.color = "var(--gold-primary)";
        }

        // --- REAL-TIME LIVE CHAT IMPLEMENTATION ---
        function fireWebChatMessage() {
            const inputField = document.getElementById('chat-input-field');
            const contentText = inputField.value.trim();
            const senderHandle = document.getElementById('main-user-handle').value.trim() || "User_Node";
            
            if(!contentText) return;
            
            appendChatMessageToViewport(senderHandle, contentText);
            inputField.value = "";
        }

        function appendChatMessageToViewport(sender, message) {
            const viewport = document.getElementById('chat-logs-viewport');
            const now = new Date();
            const stamp = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            const messageRow = document.createElement('div');
            messageRow.className = "chat-msg-row";
            messageRow.innerHTML = `<span class="chat-time">[${stamp}]</span><span class="chat-user">${sender}:</span><span class="chat-body">${message}</span>`;
            
            viewport.appendChild(messageRow);
            viewport.scrollTop = viewport.scrollHeight; // Keep message list down to newest entries
        }

        // --- PERSISTENT DATA VAULT HOOK TRANSACTION WRITERS ---
        function executeDataVaultWrite() {
            const key = document.getElementById('web-storage-tag').value.trim();
            const payload = document.getElementById('web-storage-body').value;
            localStorage.setItem("nexus_vault_" + key, payload);
            alert("Workspace elements completely extracted and synced!");
        }

        function executeDataVaultRead() {
            const key = document.getElementById('web-storage-tag').value.trim();
            const fetchedData = localStorage.getItem("nexus_vault_" + key);
            if(fetchedData !== null) {
                document.getElementById('web-storage-body').value = fetchedData;
            } else {
                alert("No data records found under this lookup parameter.");
            }
        }
    </script>
</body>
</html>
